# Self-hosting Docker Compose - starts PostgreSQL, backend, frontend, and Caddy reverse proxy.
#
# Usage:
#   cp .env.example .env
#   # Edit .env - change JWT_SECRET, BACKEND_ORIGIN, and domain settings at minimum
#   docker compose -f docker-compose.selfhost.yml up -d
#
# Frontend: https://app.cimeria.online (via Caddy)
# Backend/API: https://api.cimeria.online (via Caddy, with auto TLS)
# Tracking: https://api.cimeria.online/track/pixel/{id} and /track/click/{id}

name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # No need to expose port externally - Caddy proxies traffic.
    # Keep internal port mapping for direct access during development.
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-https://api.cimeria.online}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://app.cimeria.online}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.cimeria.online,https://api.cimeria.online}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@cimeria.online}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      APP_ENV: ${APP_ENV:-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://app.cimeria.online/auth/callback}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.cimeria.online}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-https://app.cimeria.online}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"

volumes:
  pgdata:
  backend_uploads:
  caddy_data:
  caddy_config:
